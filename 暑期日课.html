<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>暑期日课</title>
<meta name='apple-mobile-web-app-capable' content='yes'>
<meta name='apple-mobile-web-app-status-bar-style' content='default'>
<meta name='apple-mobile-web-app-title' content='暑期日课'>
<link rel='manifest' href='manifest.json'>
<link rel='icon' href='icon.svg' type='image/svg+xml'>
<link rel='apple-touch-icon' href='icon.svg'>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
 --bg: #f6f5f1;
 --card: #ffffff;
 --primary: #1e293b;
 --accent: #d97706;
 --accent-soft: #fbbf24;
 --focus: #2563eb;
 --rest: #059669;
 --text: #334155;
 --text-dim: #94a3b8;
 --border: #e2e8f0;
 --radius: 12px;
 --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
 font-size:15px
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC",sans-serif;min-height:100vh;display:flex;justify-content:center;padding:16px}
.app{max-width:820px;width:100%}
header{display:flex;justify-content:space-between;align-items:flex-end;padding:12px 4px 16px}
header h1{font-size:1.6rem;font-weight:700;color:var(--primary);letter-spacing:-.02em}
header h1 span{color:var(--accent)}
header .date{font-size:.85rem;color:var(--text-dim)}
.timer-panel{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:28px 24px 24px;margin-bottom:20px;text-align:center;transition:all .3s}
.timer-panel .task-label{font-size:.8rem;color:var(--text-dim);margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em}
.timer-panel .task-name{font-size:1.05rem;font-weight:600;color:var(--primary);margin-bottom:16px;min-height:1.5em}
.timer-panel .timer-display{font-size:4rem;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.03em;color:var(--primary);line-height:1;margin-bottom:20px;font-feature-settings:"tnum"}
.timer-panel .timer-display.rest-mode{color:var(--rest)}
.timer-panel .status-badge{display:inline-block;font-size:.75rem;padding:3px 12px;border-radius:99px;margin-bottom:12px;font-weight:600}
.status-badge.idle{background:#f1f5f9;color:var(--text-dim)}
.status-badge.focusing{background:#eff6ff;color:var(--focus)}
.status-badge.resting{background:#ecfdf5;color:var(--rest)}
.timer-actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.timer-actions button{padding:10px 28px;border-radius:99px;border:none;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit}
.timer-actions .btn-start{background:var(--focus);color:#fff}
.timer-actions .btn-start:hover{background:#1d4ed8}
.timer-actions .btn-pause{background:#f1f5f9;color:var(--text)}
.timer-actions .btn-pause:hover{background:#e2e8f0}
.timer-actions .btn-reset{background:transparent;color:var(--text-dim);padding:10px 12px}
.timer-actions .btn-reset:hover{color:var(--text)}
.timer-panel.idle .timer-display{color:var(--text-dim)}
.schedule-title{font-size:1.05rem;font-weight:700;color:var(--primary);padding:4px 4px 12px;display:flex;align-items:center;gap:8px}
.schedule-title .count{font-size:.75rem;font-weight:400;color:var(--text-dim)}
.schedule{display:flex;flex-direction:column;gap:6px}
.block{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px 16px;display:grid;grid-template-columns:auto 1fr auto;gap:10px 14px;align-items:center;transition:all .2s;border-left:3px solid var(--border);position:relative}
.block.active{border-left-color:var(--focus);background:#fafcff}
.block.completed{border-left-color:var(--rest);opacity:.7}
.block .block-time{font-size:.8rem;font-weight:600;color:var(--text-dim);white-space:nowrap;grid-row:1;grid-column:1}
.block .block-input{grid-row:2;grid-column:1/3;width:100%}
.block .block-input input{border:none;background:#f8fafc;padding:8px 12px;border-radius:8px;font-size:.85rem;font-family:inherit;color:var(--text);width:100%;outline:none;transition:background .15s}
.block .block-input input:focus{background:#eef2ff;box-shadow:0 0 0 2px rgba(37,99,235,.15)}
.block .block-input input::placeholder{color:var(--text-dim)}
.block .block-meta{grid-row:1;grid-column:2;font-size:.78rem;color:var(--text-dim);display:flex;gap:12px;align-items:center}
.block .block-meta .dur{padding:2px 8px;border-radius:4px;background:#f1f5f9;font-weight:500}
.block .block-actions{grid-row:1/3;grid-column:3;display:flex;flex-direction:column;gap:4px;align-items:center}
.block .block-actions .btn-block-start{background:var(--focus);color:#fff;border:none;border-radius:99px;padding:6px 18px;font-size:.8rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
.block .block-actions .btn-block-start:hover{background:#1d4ed8}
.block .block-actions .btn-block-start:disabled{background:#e2e8f0;color:#94a3b8;cursor:not-allowed}
.block .block-status{font-size:.7rem;color:var(--text-dim);white-space:nowrap}
.block .block-status.done{color:var(--rest);font-weight:600}
.timeline-connector{text-align:center;font-size:.7rem;color:var(--text-dim);padding:2px 0;position:relative}
.timeline-connector::before{content:'';display:block;width:1px;height:8px;background:var(--border);margin:0 auto}
.rest-label{display:inline-block;background:var(--bg);padding:0 8px;color:var(--text-dim)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);backdrop-filter:blur(4px);z-index:100;justify-content:center;align-items:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:var(--card);border-radius:16px;padding:32px 28px 28px;max-width:400px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.15);text-align:center;animation:modalIn .25s ease}
@keyframes modalIn{from{opacity:0;transform:translateY(16px) scale(.97)}}
.modal h2{font-size:1.15rem;margin-bottom:4px}
.modal .sub{color:var(--text-dim);font-size:.85rem;margin-bottom:20px}
.modal-options{display:flex;flex-direction:column;gap:10px}
.modal-options button{padding:14px 20px;border-radius:12px;border:2px solid var(--border);font-size:.9rem;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit;text-align:left;display:flex;align-items:center;gap:12px}
.modal-options button:hover{border-color:var(--accent);background:#fffbeb}
.modal-options button .opt-icon{font-size:1.4rem;flex-shrink:0}
.modal-options button .opt-text{flex:1}
.modal-options button .opt-text .opt-title{display:block;font-size:.95rem;color:var(--primary)}
.modal-options button .opt-text .opt-desc{display:block;font-size:.75rem;color:var(--text-dim);font-weight:400;margin-top:2px}
.modal .rest-adjust{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:12px;padding:8px;background:#f8fafc;border-radius:10px}
.modal .rest-adjust label{font-size:.8rem;color:var(--text-dim)}
.modal .rest-adjust input{width:60px;text-align:center;border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:.9rem;font-weight:600;font-family:inherit}
.modal .rest-adjust .adj-btn{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:1rem;font-weight:700;color:var(--text);font-family:inherit}
.modal .rest-adjust .adj-btn:hover{background:#f1f5f9}
.modal .btn-confirm-rest{background:var(--rest);color:#fff;border:none;border-radius:99px;padding:10px 32px;font-size:.9rem;font-weight:600;cursor:pointer;font-family:inherit;margin-top:12px;transition:all .15s}
.modal .btn-confirm-rest:hover{background:#047857}
.modal .btn-continue{background:var(--accent);color:#fff;border:none;border-radius:99px;padding:10px 32px;font-size:.9rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.modal .btn-continue:hover{background:#b45309}
.celebration{display:none;text-align:center;padding:40px 20px;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow)}
.celebration.show{display:block}
.celebration .big{font-size:3rem;margin-bottom:8px}
.celebration h2{font-size:1.3rem;margin-bottom:6px}
.celebration p{color:var(--text-dim);font-size:.9rem;margin-bottom:16px}
.celebration .reset-btn{background:var(--accent);color:#fff;border:none;border-radius:99px;padding:10px 28px;font-size:.9rem;font-weight:600;cursor:pointer;font-family:inherit}
@media (max-width:560px){
body{padding:8px}
.app{max-width:100%}
header h1{font-size:1.3rem}
.timer-panel{padding:20px 16px 18px}
.timer-panel .timer-display{font-size:3rem}
.block{grid-template-columns:1fr auto;gap:6px 10px;padding:12px 14px}
.block .block-time{grid-row:1;grid-column:1}
.block .block-meta{grid-row:2;grid-column:1}
.block .block-input{grid-row:3;grid-column:1/3}
.block .block-actions{grid-row:1;grid-column:2;justify-self:end}
.modal{padding:24px 20px}
}
</style>
</head>
<body>
<div class="app">
<header>
<h1>暑期<span>日课</span></h1>
<div class="date" id="dateDisplay"></div>
</header>
<div class="timer-panel idle" id="timerPanel">
<div class="status-badge idle" id="statusBadge">待开始</div>
<div class="task-label">当前任务</div>
<div class="task-name" id="taskName">选择下方一个时间段开始</div>
<div class="timer-display" id="timerDisplay">45:00</div>
<div class="timer-actions" id="timerActions">
<button class="btn-start" id="btnStart" disabled>开始专注</button>
<button class="btn-pause" id="btnPause" style="display:none">暂停</button>
<button class="btn-reset" id="btnReset" style="display:none">重置</button>
</div>
</div>
<div class="schedule-title">
今日日程 <span class="count" id="progressCount">0/8 已完成</span>
</div>
<div class="schedule" id="scheduleContainer"></div>
<div class="celebration" id="celebration">
<div class="big">🎉</div>
<h2>今日任务全部完成！</h2>
<p>你度过了充实的一天，真棒。</p>
<button class="reset-btn" onclick="resetDay()">重置，开始新的一天</button>
</div>
</div>
<div class="modal-overlay" id="modalOverlay">
<div class="modal" id="timerEndModal">
<h2 id="modalTitle">时间到！</h2>
<div class="sub" id="modalSub">任务计时已结束</div>
<div id="modalBody">
<div class="modal-options">
<button id="optRest">
<span class="opt-icon">🧘</span>
<span class="opt-text">
<span class="opt-title">休息一下</span>
<span class="opt-desc" id="restDesc">休息 10 分钟后再继续</span>
</span>
</button>
<button id="optContinue">
<span class="opt-icon">⚡</span>
<span class="opt-text">
<span class="opt-title">任务没完成，继续学</span>
<span class="opt-desc">缩短休息时间，提前开始下一段</span>
</span>
</button>
</div>
<div class="rest-adjust" id="restAdjust">
<label>休息时长</label>
<button class="adj-btn" id="restMinus">−</button>
<input type="number" id="restInput" value="10" min="1" max="60">
<button class="adj-btn" id="restPlus">+</button>
<span style="font-size:.8rem;color:var(--text-dim)">分钟</span>
</div>
</div>
<div id="modalResting" style="display:none">
<div style="font-size:2.5rem;font-weight:700;color:var(--rest);font-feature-settings:'tnum';margin:8px 0" id="restTimerDisplay">10:00</div>
<button class="btn-confirm-rest" id="btnSkipRest">跳过休息 →</button>
</div>
<div id="modalContinue" style="display:none">
<p style="font-size:.9rem;color:var(--text-dim);margin-bottom:12px">已缩短休息时间，下一段学习马上开始。</p>
<button class="btn-continue" id="btnConfirmContinue">好，开始下一段</button>
</div>
</div>
</div>
<script>
const DEFAULT_BLOCKS = [
{start:'07:00',end:'07:50',icon:'🌅',focusMin:45,restMin:10,task:''},
{start:'08:00',end:'08:50',icon:'☀️',focusMin:45,restMin:10,task:''},
{start:'09:00',end:'09:50',icon:'☀️',focusMin:45,restMin:10,task:''},
{start:'10:00',end:'10:50',icon:'📖',focusMin:45,restMin:15,task:''},
{start:'14:00',end:'14:50',icon:'🌤️',focusMin:45,restMin:10,task:''},
{start:'15:00',end:'15:50',icon:'🌤️',focusMin:45,restMin:10,task:''},
{start:'17:00',end:'17:50',icon:'🏃',focusMin:40,restMin:20,task:''},
{start:'20:00',end:'20:50',icon:'🌙',focusMin:45,restMin:10,task:''}
];
let blocks=[];let currentIdx=-1;let timerState='idle';let timerRemaining=0;let timerInterval=null;let currentPhase='focus';
const $=(id)=>document.getElementById(id);
const scheduleEl=$('scheduleContainer');const timerPanel=$('timerPanel');
const statusBadge=$('statusBadge');const taskName=$('taskName');
const timerDisplay=$('timerDisplay');const btnStart=$('btnStart');
const btnPause=$('btnPause');const btnReset=$('btnReset');
const progressCount=$('progressCount');const celebration=$('celebration');
const modalOverlay=$('modalOverlay');const modalTitle=$('modalTitle');
const modalSub=$('modalSub');const modalBody=$('modalBody');
const modalResting=$('modalResting');const modalContinue=$('modalContinue');
const restDesc=$('restDesc');const restInput=$('restInput');
const restTimerDisplay=$('restTimerDisplay');const optRest=$('optRest');
const optContinue=$('optContinue');const btnSkipRest=$('btnSkipRest');
const btnConfirmContinue=$('btnConfirmContinue');
const restMinus=$('restMinus');const restPlus=$('restPlus');
function init(){
const saved=localStorage.getItem('summer_plan_blocks');
if(saved){try{blocks=JSON.parse(saved)}catch(e){blocks=JSON.parse(JSON.stringify(DEFAULT_BLOCKS))}}
else{blocks=JSON.parse(JSON.stringify(DEFAULT_BLOCKS))}
const si=localStorage.getItem('summer_plan_currentIdx');
const st=localStorage.getItem('summer_plan_timerRemaining');
const ss=localStorage.getItem('summer_plan_timerState');
const sp=localStorage.getItem('summer_plan_phase');
if(ss&&ss!=='idle'){currentIdx=si?parseInt(si):-1;timerRemaining=st?parseInt(st):0;timerState=ss;currentPhase=sp||'focus'}
updateDate();renderSchedule();
if(currentIdx>=0&&timerState!=='idle')startTimerFromSaved();else updateTimerPanel();
}
function updateDate(){
const d=new Date();const wk=['周日','周一','周二','周三','周四','周五','周六'];
$('dateDisplay').textContent=d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日 '+wk[d.getDay()];
}
function saveState(){
localStorage.setItem('summer_plan_blocks',JSON.stringify(blocks));
localStorage.setItem('summer_plan_currentIdx',currentIdx);
localStorage.setItem('summer_plan_timerRemaining',timerRemaining);
localStorage.setItem('summer_plan_timerState',timerState);
localStorage.setItem('summer_plan_phase',currentPhase);
}
function renderSchedule(){
scheduleEl.innerHTML='';let completed=0;
blocks.forEach((b,i)=>{
if(b.status==='completed')completed++;const isLast=i===blocks.length-1;
const el=document.createElement('div');el.className='block';
if(i===currentIdx&&timerState!=='idle')el.classList.add('active');
if(b.status==='completed')el.classList.add('completed');
el.innerHTML='<div class="block-time">'+b.icon+' '+b.start+'\u2013'+b.end+'</div>'+
'<div class="block-meta"><span class="dur">学习 '+b.focusMin+'\u2032</span><span style="color:var(--text-dim)">\u00b7</span><span class="dur" style="background:#ecfdf5;color:var(--rest)">休息 '+b.restMin+'\u2032</span></div>'+
'<div class="block-input"><input type="text" placeholder="填写此段任务\u2026" value="'+(b.task||'').replace(/"/g,'&quot;')+'" data-idx="'+i+'"></div>'+
'<div class="block-actions">'+(b.status==='completed'?'<span class="block-status done">\u2713 完成</span>':'<button class="btn-block-start" data-idx="'+i+'"'+(timerState!=='idle'&&i!==currentIdx?' disabled':'')+'>'+(i===currentIdx&&(timerState==='focusing'||timerState==='paused')?'进行中':'开始')+'</button>')+'</div>';
scheduleEl.appendChild(el);
if(!isLast){const c=document.createElement('div');c.className='timeline-connector';c.innerHTML='<span class="rest-label">休息 '+b.restMin+'\u2032</span>';scheduleEl.appendChild(c);}
});
progressCount.textContent=completed+'/'+blocks.length+' 已完成';
celebration.style.display=completed===blocks.length?'block':'none';
timerPanel.style.display=(completed===blocks.length&&timerState==='idle')?'none':'';
scheduleEl.querySelectorAll('input').forEach(inp=>{inp.addEventListener('change',function(){const idx=parseInt(this.dataset.idx);blocks[idx].task=this.value;saveState();})});
scheduleEl.querySelectorAll('.btn-block-start').forEach(btn=>{btn.addEventListener('click',function(){startBlock(parseInt(this.dataset.idx))})});
}
function startBlock(idx){
if(timerState!=='idle'||blocks[idx].status==='completed')return;
currentIdx=idx;timerState='focusing';currentPhase='focus';
timerRemaining=blocks[idx].focusMin*60;updateTimerPanel();renderSchedule();startCountdown();saveState();
}
function updateTimerPanel(){
if(currentIdx<0||currentIdx>=blocks.length||blocks[currentIdx]?.status==='completed'){
timerPanel.className='timer-panel idle';statusBadge.className='status-badge idle';statusBadge.textContent='待开始';
taskName.textContent='选择下方一个时间段开始';timerDisplay.textContent='45:00';timerDisplay.className='timer-display';
btnStart.disabled=true;btnStart.style.display='';btnPause.style.display='none';btnReset.style.display='none';return;
}
const b=blocks[currentIdx];
taskName.textContent=(b.task||'未填写任务')+' \u00b7 '+b.start+'\u2013'+b.end;
if(timerState==='focusing'){
timerPanel.className='timer-panel';statusBadge.className='status-badge focusing';statusBadge.textContent='专注中';
timerDisplay.className='timer-display';btnStart.style.display='none';btnPause.style.display='';btnReset.style.display='';
}else if(timerState==='paused'){
timerPanel.className='timer-panel';statusBadge.className='status-badge focusing';statusBadge.textContent='已暂停';
timerDisplay.className='timer-display';btnStart.textContent='继续';btnStart.disabled=false;btnStart.style.display='';btnPause.style.display='none';btnReset.style.display='';
}else if(timerState==='resting'){
timerPanel.className='timer-panel';statusBadge.className='status-badge resting';statusBadge.textContent='休息中';
timerDisplay.className='timer-display rest-mode';btnStart.style.display='none';btnPause.style.display='none';btnReset.style.display='none';
}else{
timerPanel.className='timer-panel idle';statusBadge.className='status-badge idle';statusBadge.textContent='待开始';
timerDisplay.className='timer-display';btnStart.textContent='开始专注';btnStart.disabled=false;btnStart.style.display='';btnPause.style.display='none';btnReset.style.display='none';
}
const m=Math.floor(timerRemaining/60),s=timerRemaining%60;
timerDisplay.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}
function startCountdown(){
clearInterval(timerInterval);
timerInterval=setInterval(()=>{
if(timerState==='focusing'||timerState==='resting'){
timerRemaining--;
if(timerRemaining<=0){clearInterval(timerInterval);timerRemaining=0;if(currentPhase==='focus')onFocusComplete();else onRestComplete();return;}
const m=Math.floor(timerRemaining/60),s=timerRemaining%60;
timerDisplay.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');saveState();
}
},1000);
}
function startTimerFromSaved(){
if(timerState==='focusing'||timerState==='resting'){updateTimerPanel();startCountdown();}
else if(timerState==='paused')updateTimerPanel();
}
btnStart.addEventListener('click',()=>{
if(timerState==='paused'){timerState='focusing';currentPhase='focus';updateTimerPanel();startCountdown();saveState();}
else if(currentIdx>=0&&timerState==='idle')startBlock(currentIdx);
});
btnPause.addEventListener('click',()=>{if(timerState==='focusing'){timerState='paused';clearInterval(timerInterval);updateTimerPanel();saveState();}});
btnReset.addEventListener('click',()=>{clearInterval(timerInterval);timerState='idle';currentPhase='focus';currentIdx=-1;timerRemaining=0;modalOverlay.classList.remove('open');updateTimerPanel();renderSchedule();saveState();});
function onFocusComplete(){
timerState='idle';const b=blocks[currentIdx];showModal(b.restMin);updateTimerPanel();saveState();
}
function showModal(d){
modalBody.style.display='';modalResting.style.display='none';modalContinue.style.display='none';
modalTitle.textContent='时间到！';modalSub.textContent='当前学习时段已完成，接下来做什么？';
restInput.value=d||10;restDesc.textContent='休息 '+restInput.value+' 分钟后再继续';modalOverlay.classList.add('open');
}
restMinus.addEventListener('click',()=>{let v=parseInt(restInput.value)||1;if(v>1)v--;restInput.value=v;restDesc.textContent='休息 '+v+' 分钟后再继续';});
restPlus.addEventListener('click',()=>{let v=parseInt(restInput.value)||10;if(v<60)v++;restInput.value=v;restDesc.textContent='休息 '+v+' 分钟后再继续';});
restInput.addEventListener('change',()=>{let v=parseInt(restInput.value)||10;if(v<1)v=1;if(v>60)v=60;restInput.value=v;restDesc.textContent='休息 '+v+' 分钟后再继续';});
optRest.addEventListener('click',()=>{const m=parseInt(restInput.value)||10;startRest(m);});
function startRest(minutes){
modalBody.style.display='none';modalResting.style.display='';modalTitle.textContent='\u{1F9D8} 休息时间';
modalSub.textContent='休息 '+minutes+' 分钟，放松一下';timerState='resting';currentPhase='rest';
timerRemaining=minutes*60;updateTimerPanel();startCountdown();
const mm=Math.floor(timerRemaining/60),ss=timerRemaining%60;
restTimerDisplay.textContent=String(mm).padStart(2,'0')+':'+String(ss).padStart(2,'0');saveState();
const ri=setInterval(()=>{if(timerState==='resting'&&modalOverlay.classList.contains('open')){const a=Math.floor(timerRemaining/60),b=timerRemaining%60;restTimerDisplay.textContent=String(a).padStart(2,'0')+':'+String(b).padStart(2,'0');}else clearInterval(ri);},500);
}
btnSkipRest.addEventListener('click',()=>{clearInterval(timerInterval);timerRemaining=0;onRestComplete();});
optContinue.addEventListener('click',()=>{modalBody.style.display='none';modalContinue.style.display='';modalTitle.textContent='\u26A1 继续前进';modalSub.textContent='休息时间已缩短，下一段提前开始';});
btnConfirmContinue.addEventListener('click',()=>{
const nx=currentIdx+1;
if(nx<blocks.length){
blocks[currentIdx].restMin=Math.max(2,Math.floor(blocks[currentIdx].restMin/3));
blocks[currentIdx].status='completed';currentIdx=nx;timerState='focusing';currentPhase='focus';
timerRemaining=blocks[nx].focusMin*60;modalOverlay.classList.remove('open');updateTimerPanel();renderSchedule();startCountdown();saveState();
}else{blocks[currentIdx].status='completed';currentIdx=-1;timerState='idle';timerRemaining=0;modalOverlay.classList.remove('open');renderSchedule();updateTimerPanel();saveState();}
});
function onRestComplete(){
timerState='idle';const b=blocks[currentIdx];if(b)b.status='completed';modalOverlay.classList.remove('open');
const nx=currentIdx+1;
if(nx<blocks.length){currentIdx=nx;timerState='focusing';currentPhase='focus';timerRemaining=blocks[nx].focusMin*60;updateTimerPanel();renderSchedule();startCountdown();saveState();}
else{currentIdx=-1;timerRemaining=0;updateTimerPanel();renderSchedule();saveState();}
}
function resetDay(){
if(!confirm('重置后将清除所有任务和进度，确定吗？'))return;
blocks=JSON.parse(JSON.stringify(DEFAULT_BLOCKS));currentIdx=-1;timerState='idle';timerRemaining=0;currentPhase='focus';
clearInterval(timerInterval);modalOverlay.classList.remove('open');timerPanel.style.display='';
localStorage.removeItem('summer_plan_blocks');localStorage.removeItem('summer_plan_currentIdx');
localStorage.removeItem('summer_plan_timerRemaining');localStorage.removeItem('summer_plan_timerState');localStorage.removeItem('summer_plan_phase');
renderSchedule();updateTimerPanel();
}
document.addEventListener('keydown',e=>{if(e.key===' '&&timerState!=='idle'&&!modalOverlay.classList.contains('open')){e.preventDefault();if(timerState==='focusing')btnPause.click();else if(timerState==='paused')btnStart.click();}});
init();
</script>
</body>
</html>
